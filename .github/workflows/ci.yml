name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-lint-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  ml-api-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "import main; print('FastAPI app imports successfully')"